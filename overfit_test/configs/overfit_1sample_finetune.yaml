# =============================================================================
# DIRECTOR: Fine-tune from step 2600 (24.71 dB) with reduced LR for stability
# Resume from checkpoints_overfit_full/checkpoint_v2_test2.pt (step 2600)
# =============================================================================

seed: 42
cuda_device: 0

model:
  backbone: "THUDM/CogVideoX-2b"
  freeze_backbone: true
  unfreeze_backbone_last_n: 30
  inner_dim: 1920
  text_embed_dim: 4096
  num_heads: 30
  head_dim: 64
  num_layers: 30
  max_text_seq_length: 226
  patch_size: 2
  vae_latent_channels: 16
  vae_spatial_scale: 8
  vae_temporal_compression: 4
  vae_scaling_factor: 1.15258426

  context:
    local_token_count: 256
    num_local_frames: 2
    global_token_count: 64
    max_characters: 4
    context_dim: 1920
    clip_vision_dim: 1024
    local_proj_dim: 1920
    global_proj_dim: 1920
    clip_model: "openai/clip-vit-large-patch14"

  dropout:
    drop_global_prob: 0.0
    drop_local_prob: 0.0
    keep_both_prob: 1.0

  attention:
    inject_layers: "all"
    context_gate_init: 0.0
    adapter_init_gain: 0.01

dataset:
  dataset_dir: "data/overfit_1sample"
  video:
    num_frames: 49
    fps: 8
    height: 480
    width: 720
    latent_height: 60
    latent_width: 90
    latent_frames: 13
  captioning:
    model: "llava"
    max_caption_length: 200
  dataloader:
    batch_size: 1
    num_workers: 0
    pin_memory: true
    prefetch_factor: 2

training:
  optimizer:
    type: "adamw8bit"
    lr: 1.0e-5              # 10x lower encoder LR
    adapter_lr: 5.0e-5       # 10x lower adapter LR
    gate_lr: 1.0e-3          # 10x lower gate LR
    backbone_lr: 1.0e-5      # 10x lower backbone LR (was 1e-4)
    weight_decay: 0.0
    betas: [0.9, 0.999]
    eps: 1.0e-8

  scheduler:
    type: "cosine"
    warmup_steps: 0
    min_lr_ratio: 1.0

  num_epochs: 9999
  max_steps: 5000
  gradient_accumulation_steps: 1
  max_grad_norm: 1.0

  mixed_precision: "bf16"
  gradient_checkpointing: true

  train_height: 320
  train_width: 512
  train_frames: 13

  flow_matching:
    sigma_min: 0.001
    time_sampling: "uniform"

  checkpoint:
    save_every_steps: 200
    save_dir: "checkpoints_overfit_ft"
    keep_last_n: 5
    save_best: true
    best_metric: "loss"

  logging:
    log_every_steps: 10
    tensorboard_dir: "logs/overfit_finetune"
    log_grad_norm: true

  sample_generation:
    every_steps: 999999
    ablation_every_steps: 999999
    multishot_every_steps: 999999
    num_steps: 50
    num_frames_to_log: 8
    save_dir: "samples/overfit_finetune"
